<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이코노미 스쿨 — 경제 학습 앱</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111418;
      --surface2: #181d24;
      --border: #1e2530;
      --accent: #f0b429;
      --accent2: #e05252;
      --korea: #c0392b;
      --global: #2980b9;
      --text: #e8eaf0;
      --text2: #8a93a8;
      --green: #27ae60;
      --red: #e74c3c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === HEADER === */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,12,16,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo span {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--text2);
      letter-spacing: 2px;
      display: block;
      margin-top: -4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-badge {
      background: var(--red);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 2px;
      letter-spacing: 1px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* === TICKER === */
    .ticker-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      height: 36px;
      display: flex;
      align-items: center;
    }

    .ticker-label {
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 0 14px;
      height: 100%;
      display: flex;
      align-items: center;
      letter-spacing: 1px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ticker-track {
      display: flex;
      animation: ticker 40s linear infinite;
      white-space: nowrap;
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 28px;
      font-size: 12px;
      font-weight: 500;
      border-right: 1px solid var(--border);
    }

    .ticker-item .name { color: var(--text2); }
    .ticker-item .val { color: var(--text); font-weight: 700; }
    .ticker-item .chg.up { color: var(--green); }
    .ticker-item .chg.dn { color: var(--red); }

    /* === LAYOUT === */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* === TABS === */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      color: var(--text2);
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* === SECTION TITLE === */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
    }

    .section-sub {
      font-size: 12px;
      color: var(--text2);
      font-weight: 300;
    }

    /* === GRID LAYOUTS === */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .grid-main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }

    /* === VIDEO CARD === */
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }

    .video-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(240,180,41,0.1);
    }

    .video-thumb {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      overflow: hidden;
    }

    .video-thumb iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .video-thumb-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .play-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      transition: background 0.2s;
    }

    .play-btn {
      width: 52px;
      height: 52px;
      background: rgba(240,180,41,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #000;
      transition: transform 0.2s;
    }

    .video-card:hover .play-btn { transform: scale(1.1); }

    .video-info {
      padding: 14px 16px;
    }

    .video-channel {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .video-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 8px;
    }

    .video-meta {
      font-size: 11px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .tag-korea { background: rgba(192,57,43,0.2); color: #e74c3c; }
    .tag-global { background: rgba(41,128,185,0.2); color: #5dade2; }
    .tag-market { background: rgba(240,180,41,0.15); color: var(--accent); }
    .tag-beginner { background: rgba(39,174,96,0.2); color: #2ecc71; }

    /* === NEWS CARD === */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .news-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .news-item:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .news-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--border);
      line-height: 1;
      flex-shrink: 0;
      min-width: 32px;
    }

    .news-body { flex: 1; }

    .news-source {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .news-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 6px;
    }

    .news-summary {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
    }

    .news-time {
      font-size: 10px;
      color: var(--text2);
      margin-top: 6px;
    }

    /* === MARKET WIDGET === */
    .market-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .market-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 4px;
      text-align: center;
      transition: all 0.2s;
    }

    .market-card:hover { border-color: var(--border); background: var(--surface2); }

    .market-name {
      font-size: 11px;
      color: var(--text2);
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .market-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      color: var(--text);
    }

    .market-chg {
      font-size: 12px;
      font-weight: 700;
      margin-top: 4px;
    }

    .market-chg.up { color: var(--green); }
    .market-chg.dn { color: var(--red); }

    /* === MODAL (video player) === */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 90%;
      max-width: 860px;
      border-radius: 4px;
      overflow: hidden;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      padding-right: 12px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s;
    }

    .modal-close:hover { color: var(--red); }

    .modal-player {
      width: 100%;
      padding-top: 56.25%;
      position: relative;
      background: #000;
    }

    .modal-player iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* === STUDY CARDS (개념) === */
    .concept-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .concept-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .concept-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 3px;
      height: 100%;
    }

    .concept-card.yellow::before { background: var(--accent); }
    .concept-card.red::before { background: var(--korea); }
    .concept-card.blue::before { background: var(--global); }
    .concept-card.green::before { background: var(--green); }

    .concept-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .concept-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .concept-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .concept-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.7;
    }

    .concept-level {
      display: inline-block;
      margin-top: 12px;
      padding: 3px 10px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 700;
    }

    /* === DIVIDER === */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .grid-main, .grid-2, .grid-3, .market-grid, .concept-grid {
        grid-template-columns: 1fr;
      }
      .container { padding: 16px; }
      .tabs { overflow-x: auto; }
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

    /* === CONCEPT DETAIL === */
    .concept-detail {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 28px;
      margin-top: 16px;
    }

    .concept-detail.open { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .concept-detail h3 {
      font-family: 'Noto Serif KR', serif;
      font-size: 18px;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .concept-detail p {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .concept-detail .example {
      background: var(--surface);
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
    }
  </style>
</head>

<!-- VIDEO MODAL -->

// ===================== RENDER =====================

function buildTicker() {
  const items = [...MARKET_DATA, ...MARKET_DATA].map(m => `
    <div class="ticker-item">
      <span class="name">${m.name}</span>
      <span class="val">${m.val}</span>
      <span class="chg ${m.up ? 'up' : 'dn'}">${m.chg}</span>
    </div>
  `).join('');
  document.getElementById('tickerTrack').innerHTML = items;
}

function buildMarketCards(data, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = data.map(m => `
    <div class="market-card">
      <div class="market-name">${m.name}</div>
      <div class="market-val">${m.val}</div>
      <div class="market-chg ${m.up ? 'up' : 'dn'}">${m.up ? '▲' : '▼'} ${m.chg}</div>
    </div>
  `).join('');
}

function videoCardHTML(v) {
  const tags = (v.tags || []).map((t, i) => `<span class="tag ${t}">${v.tagLabels[i]}</span>`).join(' ');
  return `
    <div class="video-card" onclick="openVideo('${v.id}', '${v.title.replace(/'/g, "\\'")}')">
      <div class="video-thumb">
        <img class="video-thumb-img" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.title}" loading="lazy">
        <div class="play-overlay">
          <div class="play-btn">▶</div>
        </div>
      </div>
      <div class="video-info">
        <div class="video-channel">${v.channel}</div>
        <div class="video-title">${v.title}</div>
        <div class="video-meta">
          ${tags}
          <span>${v.time}</span>
        </div>
      </div>
    </div>`;
}

function newsItemHTML(n) {
  const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(n.title + ' ' + n.source)}&tbm=nws`;
  return `
    <div class="news-item" onclick="window.open('${searchUrl}', '_blank')" style="cursor:pointer;">
      <div class="news-num">${n.num}</div>
      <div class="news-body">
        <div class="news-source">${n.source}</div>
        <div class="news-title">${n.title} <span style="font-size:10px;color:var(--accent);">🔗</span></div>
        <div class="news-summary">${n.summary}</div>
        <div class="news-time">🕐 ${n.time} &nbsp;·&nbsp; <span style="color:var(--accent);font-size:10px;">관련기사 보기 →</span></div>
      </div>
    </div>`;
}

function buildVideos(list, containerId) {
  const el = document.getElementById(containerId);
  if (el) el.innerHTML = list.map(videoCardHTML).join('');
}

function buildNews(list, containerId) {
  const el = document.getElementById(containerId);
  if (el) el.innerHTML = list.map(newsItemHTML).join('');
}

  const sections = [
    { title: "주요 지수", items: MARKET_DATA.slice(0, 4) },
    { title: "환율 & 원자재", items: MARKET_DATA.slice(4) },
  ];
  let html = '';
  sections.forEach(s => {
    html += `<div class="section-header" style="margin-bottom:12px"><div class="section-title" style="font-size:16px">${s.title}</div></div>`;
    html += `<div class="market-grid" style="margin-bottom:24px">`;
    html += s.items.map(m => `
      <div class="market-card">
        <div class="market-name">${m.name}</div>
        <div class="market-val">${m.val}</div>
        <div class="market-chg ${m.up ? 'up' : 'dn'}">${m.up ? '▲' : '▼'} ${m.chg}</div>
      </div>`).join('');
    html += `</div>`;
  });
  document.getElementById('fullMarket').innerHTML = html;
}

function buildConcepts() {
  document.getElementById('conceptGrid').innerHTML = CONCEPTS.map((c, i) => `
    <div class="concept-card ${c.color}" onclick="openConcept(${i})">
      <div class="concept-icon">${c.icon}</div>
      <div class="concept-title">${c.title}</div>
      <div class="concept-desc">${c.desc}</div>
      <span class="tag ${c.levelClass} concept-level">${c.level}</span>
    </div>
  `).join('');
}

let currentConcept = -1;

function openConcept(i) {
  const detail = document.getElementById('conceptDetail');
  if (currentConcept === i) {
    detail.classList.remove('open');
    currentConcept = -1;
    return;
  }
  const c = CONCEPTS[i];
  detail.innerHTML = `<h3>${c.icon} ${c.detail.title}</h3>${c.detail.body}`;
  detail.classList.add('open');
  currentConcept = i;
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===================== TABS =====================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['home','korea','global','market','study'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
}

// ===================== VIDEO MODAL =====================
function openVideo(id, title) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalIframe').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModalBtn() {
  document.getElementById('modalIframe').src = '';
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}

// ===================== INIT =====================
function init() {
  buildTicker();
  buildMarketCards(MARKET_CARDS, 'marketSummary');
  buildVideos(VIDEOS.featured, 'featuredVideos');
  buildNews(NEWS.home, 'homeNews');
  buildVideos(VIDEOS.korea, 'koreaVideos');
  buildNews(NEWS.korea, 'koreaNews');
  buildVideos(VIDEOS.global, 'globalVideos');
  buildNews(NEWS.global, 'globalNews');
  buildFullMarket();
  buildVideos(VIDEOS.market, 'marketVideos');
  buildConcepts();
  buildVideos(VIDEOS.study, 'studyVideos');
}

init();
</script>
