<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이코노미 스쿨 — 경제 학습 앱</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111418;
      --surface2: #181d24;
      --border: #1e2530;
      --accent: #f0b429;
      --accent2: #e05252;
      --korea: #c0392b;
      --global: #2980b9;
      --text: #e8eaf0;
      --text2: #8a93a8;
      --green: #27ae60;
      --red: #e74c3c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === HEADER === */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,12,16,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo span {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--text2);
      letter-spacing: 2px;
      display: block;
      margin-top: -4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-badge {
      background: var(--red);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 2px;
      letter-spacing: 1px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* === TICKER === */
    .ticker-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      height: 36px;
      display: flex;
      align-items: center;
    }

    .ticker-label {
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 0 14px;
      height: 100%;
      display: flex;
      align-items: center;
      letter-spacing: 1px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ticker-track {
      display: flex;
      animation: ticker 10s linear infinite;
      white-space: nowrap;
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 28px;
      font-size: 12px;
      font-weight: 500;
      border-right: 1px solid var(--border);
    }

    .ticker-item .name { color: var(--text2); }
    .ticker-item .val { color: var(--text); font-weight: 700; }
    .ticker-item .chg.up { color: var(--green); }
    .ticker-item .chg.dn { color: var(--red); }

    /* === LAYOUT === */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* === TABS === */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      padding: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      border-radius: 8px;
      color: var(--text2);
      transition: all 0.2s ease;
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tab .tab-icon {
      font-size: 14px;
      line-height: 1;
    }

    .tab:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .tab.active {
      background: var(--accent);
      color: #000;
      box-shadow: 0 2px 12px rgba(240,180,41,0.3);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* === SECTION TITLE === */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
    }

    .section-sub {
      font-size: 12px;
      color: var(--text2);
      font-weight: 300;
    }

    /* === GRID LAYOUTS === */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .grid-main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }

    /* === VIDEO CARD === */
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }

    .video-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(240,180,41,0.1);
    }

    .video-thumb {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      overflow: hidden;
    }

    .video-thumb iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .video-thumb-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .play-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      transition: background 0.2s;
    }

    .play-btn {
      width: 52px;
      height: 52px;
      background: rgba(240,180,41,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #000;
      transition: transform 0.2s;
    }

    .video-card:hover .play-btn { transform: scale(1.1); }

    .video-info {
      padding: 14px 16px;
    }

    .video-channel {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .video-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 8px;
    }

    .video-meta {
      font-size: 11px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .tag-korea { background: rgba(192,57,43,0.2); color: #e74c3c; }
    .tag-global { background: rgba(41,128,185,0.2); color: #5dade2; }
    .tag-market { background: rgba(240,180,41,0.15); color: var(--accent); }
    .tag-beginner { background: rgba(39,174,96,0.2); color: #2ecc71; }

    /* === NEWS CARD === */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .news-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .news-item:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .news-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--border);
      line-height: 1;
      flex-shrink: 0;
      min-width: 32px;
    }

    .news-body { flex: 1; }

    .news-source {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .news-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 6px;
    }

    .news-summary {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
    }

    .news-time {
      font-size: 10px;
      color: var(--text2);
      margin-top: 6px;
    }

    /* === MARKET WIDGET === */
    .market-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .market-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 4px;
      text-align: center;
      transition: all 0.2s;
    }

    .market-card:hover { border-color: var(--border); background: var(--surface2); }

    .market-name {
      font-size: 11px;
      color: var(--text2);
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .market-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      color: var(--text);
    }

    .market-chg {
      font-size: 12px;
      font-weight: 700;
      margin-top: 4px;
    }

    .market-chg.up { color: var(--green); }
    .market-chg.dn { color: var(--red); }

    /* === MODAL (video player) === */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 90%;
      max-width: 860px;
      border-radius: 4px;
      overflow: hidden;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      padding-right: 12px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s;
    }

    .modal-close:hover { color: var(--red); }

    .modal-player {
      width: 100%;
      padding-top: 56.25%;
      position: relative;
      background: #000;
    }

    .modal-player iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* === STUDY CARDS (개념) === */
    .concept-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .concept-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .concept-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 3px;
      height: 100%;
    }

    .concept-card.yellow::before { background: var(--accent); }
    .concept-card.red::before { background: var(--korea); }
    .concept-card.blue::before { background: var(--global); }
    .concept-card.green::before { background: var(--green); }

    .concept-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .concept-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .concept-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .concept-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.7;
    }

    .concept-level {
      display: inline-block;
      margin-top: 12px;
      padding: 3px 10px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 700;
    }

    /* === DIVIDER === */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .grid-main, .grid-2, .grid-3, .concept-grid {
        grid-template-columns: 1fr;
      }
      .market-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .container { padding: 12px; }
      .tabs {
        width: 100%;
        border-radius: 10px;
      }
      .tab {
        padding: 8px 11px;
        font-size: 11px;
        gap: 4px;
        flex: 1;
        justify-content: center;
      }
      .tab .tab-icon svg {
        width: 13px;
        height: 13px;
      }
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

    /* === CONCEPT DETAIL === */
    .concept-detail {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 28px;
      margin-top: 16px;
    }

    .concept-detail.open { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .concept-detail h3 {
      font-family: 'Noto Serif KR', serif;
      font-size: 18px;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .concept-detail p {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .concept-detail .example {
      background: var(--surface);
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="flex-shrink:0">
      <rect width="28" height="28" rx="6" fill="#f0b429"/>
      <path d="M6 20L10 14L14 17L18 10L22 8" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      ECONOMY SCHOOL
      <span>경제 공부 플랫폼</span>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge">● LIVE</div>
  </div>
</header>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-label">실시간 시장</div>
  <div style="overflow:hidden;flex:1;">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
  <div id="updateTime" style="flex-shrink:0;padding:0 12px;font-size:10px;color:var(--text2);white-space:nowrap;">로딩중...</div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('home')">
      <span class="tab-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </span>홈
    </button>
    <button class="tab" onclick="switchTab('korea')">
      <span class="tab-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </span>한국 경제
    </button>
    <button class="tab" onclick="switchTab('global')">
      <span class="tab-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
      </span>글로벌
    </button>
    <button class="tab" onclick="switchTab('market')">
      <span class="tab-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
      </span>시장
    </button>
    <button class="tab" onclick="switchTab('study')">
      <span class="tab-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
      </span>학습
    </button>
  </div>

  <!-- ===== HOME TAB ===== -->
  <div id="tab-home" class="tab-content active">

    <!-- 시장 요약 -->
    <div class="market-grid" id="marketSummary"></div>

    <div class="grid-main">
      <!-- 추천 영상 -->
      <div>
        <div class="section-header">
          <div class="section-title">오늘의 추천 영상</div>
          <div class="section-sub">경제 핵심 뉴스 & 분석</div>
        </div>
        <div class="grid-2" id="featuredVideos"></div>
      </div>

      <!-- 주요 뉴스 -->
      <div>
        <div class="section-header">
          <div class="section-title">주요 뉴스</div>
          <div class="section-sub">최신 경제 헤드라인</div>
        </div>
        <div class="news-list" id="homeNews"></div>
      </div>
    </div>
  </div>

  <!-- ===== KOREA TAB ===== -->
  <div id="tab-korea" class="tab-content">
    <div class="section-header">
      <div class="section-title">한국 경제 뉴스</div>
      <div class="section-sub">국내 경제 최신 동향</div>
    </div>
    <div class="grid-main">
      <div class="grid-2" id="koreaVideos"></div>
      <div class="news-list" id="koreaNews"></div>
    </div>
  </div>

  <!-- ===== GLOBAL TAB ===== -->
  <div id="tab-global" class="tab-content">
    <div class="section-header">
      <div class="section-title">글로벌 경제 뉴스</div>
      <div class="section-sub">세계 경제 흐름 파악</div>
    </div>
    <div class="grid-main">
      <div class="grid-2" id="globalVideos"></div>
      <div class="news-list" id="globalNews"></div>
    </div>
  </div>

  <!-- ===== MARKET TAB ===== -->
  <div id="tab-market" class="tab-content">

let MARKET_CARDS = MARKET_DATA.slice(0, 8);

async function fetchMarketData() {
  // Yahoo Finance 프록시 순차 시도
  const symbols = MARKET_SYMBOLS.map(s => s.symbol).join(',');
  const baseUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}&fields=regularMarketPrice,regularMarketChangePercent`;
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(baseUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(baseUrl)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(baseUrl)}`,
  ];

  for (const proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(5000) });
      if (!res.ok) continue;
      const json = await res.json();
      const quotes = json?.quoteResponse?.result || [];
      if (quotes.length > 0) {
        applyMarketData(quotes);
        return;
      }
    } catch(e) { continue; }
  }

  // 모두 실패 → 폴백값 유지, 참고값 표시
  updateMarketUI('참고값');
}

function applyMarketData(quotes) {
  MARKET_DATA = MARKET_SYMBOLS.map(s => {
    const q = quotes.find(q => q.symbol === s.symbol);
    if (!q) return FALLBACK_DATA.find(f => f.name === s.name) || { name: s.name, val: "—", chg: "—", up: true };
    const price = q.regularMarketPrice;
    const chgPct = q.regularMarketChangePercent;
    const up = chgPct >= 0;
    const valStr = s.prefix + (s.decimals === 0
      ? Math.round(price).toLocaleString()
      : price.toLocaleString('ko-KR', { minimumFractionDigits: s.decimals, maximumFractionDigits: s.decimals }));
    return { name: s.name, val: valStr, chg: (up ? '+' : '') + chgPct.toFixed(2) + '%', up };
  });
  MARKET_CARDS = MARKET_DATA.slice(0, 8);
  updateMarketUI('실시간');
}

function updateMarketUI(label) {
  buildTicker();
  buildMarketCards(MARKET_CARDS, 'marketSummary');
  buildFullMarket();
  const now = new Date();
  const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('updateTime').textContent = `${label} · ${timeStr}`;
}

// ===================== RENDER =====================

function buildTicker() {
  const items = [...MARKET_DATA, ...MARKET_DATA].map(m => `
    <div class="ticker-item">
      <span class="name">${m.name}</span>
      <span class="val">${m.val}</span>
      <span class="chg ${m.up ? 'up' : 'dn'}">${m.chg}</span>
    </div>
  `).join('');
  document.getElementById('tickerTrack').innerHTML = items;
}

function buildMarketCards(data, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = data.map(m => `
    <div class="market-card">
      <div class="market-name">${m.name}</div>
      <div class="market-val">${m.val}</div>
      <div class="market-chg ${m.up ? 'up' : 'dn'}">${m.up ? '▲' : '▼'} ${m.chg}</div>
    </div>
  `).join('');
}

function videoCardHTML(v) {
  const tags = (v.tags || []).map((t, i) => `<span class="tag ${t}">${v.tagLabels[i]}</span>`).join(' ');
  return `
    <div class="video-card" onclick="openVideo('${v.id}', '${v.title.replace(/'/g, "\\'")}')">
      <div class="video-thumb">
        <img class="video-thumb-img" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.title}" loading="lazy">
        <div class="play-overlay">
          <div class="play-btn">▶</div>
        </div>
      </div>
      <div class="video-info">
        <div class="video-channel">${v.channel}</div>
        <div class="video-title">${v.title}</div>
        <div class="video-meta">
          ${tags}
          <span>${v.time}</span>
        </div>
      </div>
    </div>`;
}

function newsItemHTML(n) {
  const url = n.url || `https://www.google.com/search?q=${encodeURIComponent(n.title + ' ' + n.source)}&tbm=nws`;
  return `
    <div class="news-item" onclick="window.open('${url}', '_blank')" style="cursor:pointer;">
      <div class="news-num">${n.num}</div>
      <div class="news-body">
        <div class="news-source">${n.source}</div>
        <div class="news-title">${n.title} <span style="font-size:10px;color:var(--accent);">🔗</span></div>
        <div class="news-summary">${n.summary}</div>
        <div class="news-time">🕐 ${n.time} &nbsp;·&nbsp; <span style="color:var(--accent);font-size:10px;">기사 보기 →</span></div>
      </div>
    </div>`;
}

function buildVideos(list, containerId) {
  const el = document.getElementById(containerId);
  if (el) el.innerHTML = list.map(videoCardHTML).join('');
}

function buildNews(list, containerId) {
  const el = document.getElementById(containerId);
  if (el) el.innerHTML = list.map(newsItemHTML).join('');
}

function buildFullMarket() {
  const sections = [
    { title: "🇰🇷 한국 지수", items: MARKET_DATA.filter(m => ["코스피","코스닥"].includes(m.name)) },
    { title: "🌎 미국 지수", items: MARKET_DATA.filter(m => ["S&P 500","나스닥"].includes(m.name)) },
    { title: "🌏 아시아 지수", items: MARKET_DATA.filter(m => ["닛케이225","상하이종합","항셍"].includes(m.name)) },
    { title: "🌍 유럽 지수", items: MARKET_DATA.filter(m => ["DAX(독일)","FTSE100(영국)"].includes(m.name)) },
    { title: "💱 환율", items: MARKET_DATA.filter(m => ["USD/KRW","EUR/KRW","EUR/USD"].includes(m.name)) },
    { title: "⛽ 원자재 & 자산", items: MARKET_DATA.filter(m => ["WTI유가","금","은","채권10년","BTC"].includes(m.name)) },
  ];
  let html = '';
  sections.forEach(s => {
    if (s.items.length === 0) return;
    html += `<div class="section-header" style="margin-bottom:12px"><div class="section-title" style="font-size:15px">${s.title}</div></div>`;
    html += `<div class="market-grid" style="margin-bottom:20px">`;
    html += s.items.map(m => `
      <div class="market-card">
        <div class="market-name">${m.name}</div>
        <div class="market-val">${m.val}</div>
        <div class="market-chg ${m.up ? 'up' : 'dn'}">${m.up ? '▲' : '▼'} ${m.chg}</div>
      </div>`).join('');
    html += `</div>`;
  });
  document.getElementById('fullMarket').innerHTML = html;
}

let currentCategory = 'all';

function buildCategoryBtns() {
  document.getElementById('conceptCategoryBtns').innerHTML = CONCEPT_CATEGORIES.map(cat => `
    <button onclick="filterConcepts('${cat.id}')" id="catBtn-${cat.id}" style="
      padding:8px 16px;font-size:12px;font-weight:700;border-radius:2px;cursor:pointer;
      border:1px solid ${cat.id === 'all' ? 'var(--accent)' : 'var(--border)'};
      background:${cat.id === 'all' ? 'var(--accent)' : 'var(--surface)'};
      color:${cat.id === 'all' ? '#000' : 'var(--text2)'};
      transition:all 0.2s;font-family:inherit;
    ">${cat.label}</button>
  `).join('');
}

function filterConcepts(catId) {
  currentCategory = catId;
  document.querySelectorAll('[id^="catBtn-"]').forEach(btn => {
    const isActive = btn.id === `catBtn-${catId}`;
    btn.style.background = isActive ? 'var(--accent)' : 'var(--surface)';
    btn.style.color = isActive ? '#000' : 'var(--text2)';
    btn.style.borderColor = isActive ? 'var(--accent)' : 'var(--border)';
  });
  buildConcepts();
  document.getElementById('conceptDetail').classList.remove('open');
  currentConcept = -1;
}

function buildConcepts() {
  const filtered = currentCategory === 'all'
    ? CONCEPTS
    : CONCEPTS.filter(c => c.category === currentCategory);
  document.getElementById('conceptGrid').innerHTML = filtered.map((c, i) => {
    const realIndex = CONCEPTS.indexOf(c);
    return `
      <div class="concept-card ${c.color}" onclick="openConcept(${realIndex})">
        <div class="concept-icon">${c.icon}</div>
        <div class="concept-title">${c.title}</div>
        <div class="concept-desc">${c.desc}</div>
        <span class="tag ${c.levelClass} concept-level">${c.level}</span>
      </div>`;
  }).join('');
}

let currentConcept = -1;

function openConcept(i) {
  const detail = document.getElementById('conceptDetail');
  if (currentConcept === i) {
    detail.classList.remove('open');
    currentConcept = -1;
    return;
  }
  const c = CONCEPTS[i];
  detail.innerHTML = `<h3>${c.icon} ${c.detail.title}</h3>${c.detail.body}`;
  detail.classList.add('open');
  currentConcept = i;
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===================== TABS =====================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['home','korea','global','market','study'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
}

// ===================== VIDEO MODAL =====================
function openVideo(id, title) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalIframe').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModalBtn() {
  document.getElementById('modalIframe').src = '';
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}

// ===================== INIT =====================
function init() {
  // 시장 데이터 즉시 전부 표시 (폴백값)
  MARKET_CARDS = MARKET_DATA.slice(0, 8);
  buildTicker();
  buildMarketCards(MARKET_CARDS, 'marketSummary');
  buildFullMarket();

  // 나머지 콘텐츠
  buildVideos(VIDEOS.featured, 'featuredVideos');
  buildNews(NEWS.home, 'homeNews');
  buildVideos(VIDEOS.korea, 'koreaVideos');
  buildNews(NEWS.korea, 'koreaNews');
  buildVideos(VIDEOS.global, 'globalVideos');
  buildNews(NEWS.global, 'globalNews');
  buildVideos(VIDEOS.market, 'marketVideos');
  buildCategoryBtns();
  buildConcepts();
  buildVideos(VIDEOS.study, 'studyVideos');

  // 백그라운드에서 실시간 데이터 로드 (성공 시 자동 업데이트)
  fetchMarketData();
  setInterval(fetchMarketData, 5 * 60 * 1000);
}

init();
</script>
