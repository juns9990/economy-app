name: 매일 전일 종가 자동 업데이트

on:
  schedule:
    # 매일 오전 8시 KST = 23:00 UTC (전날)
    - cron: '0 23 * * 1-5'   # 월~금만 실행 (주말 장 없음)
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 전일 종가 업데이트
        run: python3 .github/scripts/update_prices.py

      - name: 변경사항 커밋
        run: |
          git config user.name  "SIGNAL-Bot"
          git config user.email "bot@signal.auto"
          git add signal-1.html
          git diff --cached --quiet || git commit -m "📈 전일 종가 자동 업데이트 $(TZ=Asia/Seoul date '+%Y-%m-%d')"
          git push
