name: SIGNAL PRO 종목 DB 자동 갱신

on:
  schedule:
    # 매주 일요일 21:00 UTC = 월요일 06:00 KST
    - cron: '0 21 * * 0'
  workflow_dispatch:  # 수동 실행도 가능

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install pykrx pandas requests
          pip show pykrx | grep Version

      - name: 🚀 종목 DB 빌드 실행
        run: python scripts/build-stocks-db.py

      - name: 📊 빌드 결과 확인
        run: |
          ls -lh data/signal-stocks-db.json
          echo "==== JSON 메타 정보 ===="
          python -c "
          import json
          with open('data/signal-stocks-db.json', 'r', encoding='utf-8') as f:
              d = json.load(f)
          print(f'버전: {d[\"version\"]}')
          print(f'총 종목 수: {d[\"count\"]}')
          print(f'KOSPI: {d[\"markets\"][\"KOSPI\"]}')
          print(f'KOSDAQ: {d[\"markets\"][\"KOSDAQ\"]}')
          print(f'KONEX: {d[\"markets\"][\"KONEX\"]}')
          "

      - name: 💾 변경사항 자동 커밋
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "SIGNAL PRO Bot"
          git add data/signal-stocks-db.json
          if git diff --staged --quiet; then
            echo "✅ 변경사항 없음 (DB 동일)"
          else
            git commit -m "🤖 종목 DB 자동 갱신 ($(date -u +'%Y-%m-%d'))"
            git push
            echo "✅ DB 변경사항 커밋 완료"
          fi
