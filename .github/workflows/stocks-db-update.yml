name: SIGNAL PRO 종목 DB 자동 갱신

on:
  schedule:
    - cron: '0 21 * * 0'  # 매주 일요일 06:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas lxml pykrx
          echo "==== 설치 버전 확인 ===="
          pip show pykrx | grep Version
          pip show pandas | grep Version
          pip show requests | grep Version

      - name: 🌐 KRX 접근성 사전 테스트
        continue-on-error: true
        run: |
          echo "==== KRX 도메인 ping 테스트 ===="
          curl -sI --max-time 5 "http://data.krx.co.kr" | head -5 || echo "data.krx.co.kr 접근 실패"
          curl -sI --max-time 5 "https://kind.krx.co.kr" | head -5 || echo "kind.krx.co.kr 접근 실패"

      - name: 🚀 종목 DB 빌드 실행
        run: python scripts/build-stocks-db.py

      - name: 📊 빌드 결과 확인
        run: |
          ls -lh data/signal-stocks-db.json
          python -c "
          import json
          with open('data/signal-stocks-db.json', 'r', encoding='utf-8') as f:
              d = json.load(f)
          print(f'버전: {d[\"version\"]}')
          print(f'소스: {d.get(\"source\", \"unknown\")}')
          print(f'총 종목: {d[\"count\"]}')
          print(f'KOSPI: {d[\"markets\"][\"KOSPI\"]}')
          print(f'KOSDAQ: {d[\"markets\"][\"KOSDAQ\"]}')
          print(f'KONEX: {d[\"markets\"][\"KONEX\"]}')
          "

      - name: 💾 변경사항 자동 커밋
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "SIGNAL PRO Bot"
          git add data/signal-stocks-db.json
          if git diff --staged --quiet; then
            echo "✅ 변경사항 없음"
          else
            git commit -m "🤖 종목 DB 자동 갱신 ($(date -u +'%Y-%m-%d'))"
            git push
            echo "✅ DB 커밋 완료"
          fi
